<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato Simples</title>
</head>
<body>
    <form method="post" action="https://formsubmit.co/email_de_sua_escolha">
        <table border="1" align="center">
            <tr>
                <th colspan="2">Contato Simples</th>
            </tr>
            <tr>
                <th>Nome:</th>
                <th><input type="text" name="nome"></th>
            </tr>
            <tr>
                <th>E-mail:</th>
                <th><input type="text" name="mail"></th>
            </tr>
            <tr>
                <th>Mensagem:</th>
                <th><input type="text" name="mens"></th>
            </tr>
            <tr>
                <th colspan="2" class="bt"><input type="submit" name="bt" value="ENVIAR"></th>
            </tr>
        </table>
        <br>
    </form>
</body>
